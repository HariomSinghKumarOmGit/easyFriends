## LinkedIn Connection Request Automation
## All phases read from this single config file

name: linkedin_connect
description: "Automate LinkedIn connection requests — click Connect, then Send"

# ── Phase 1: Coordinate-based action sequence ──
phase1:
  coordinates:
    - { x: 950,  y: 430, label: "Connect button" }
    - { x: 1100, y: 600, label: "Send popup" }
  delay_ms: 1200
  loop: 10

# ── Phase 2: OCR-based clicks ──
phase2:
  keywords:      ["Connect", "Send", "Done"]
  skip_keywords: ["Pending", "Message", "Follow"]
  confidence_threshold: 60
  delay_ms: 1200
  loop: 10

# ── Phase 3: Vision AI ──
phase3:
  model: claude-sonnet-4-20250514
  target_prompt: "Connect button to send a connection request"
  fallback_phase: 2
  delay_ms: 1200
  loop: 10

# ── Phase 4: Mobile (Android) ──
phase4:
  device: "192.168.1.x:5555"
  connection: tcp
  resolution: "1080x2400"
  keywords: ["Connect", "Send"]
  delay_ms: 1200
  loop: 10

# ── Phase 6: Profile Analyser ──
analyser:
  enabled: true
  model: deepface               # deepface | llava
  llava_endpoint: http://localhost:11434/api/generate
  llava_model: llava

  # Profile photo crop region (pixels — tune to your screen)
  photo_crop:
    x: 80
    y: 150
    width: 120
    height: 120

  # Follower count OCR region
  follower_crop:
    x: 80
    y: 290
    width: 400
    height: 40

  filters:
    gender:
      allow: ["female"]         # female | male | any
      min_confidence: 0.65      # skip if model not confident enough
    age:
      min: 20
      max: 40
    followers:
      min: 500
      max: 50000                # skip mega accounts (likely fake/brand)

  on_skip: log                  # log | screenshot | flag
  on_connect: log

# ── Shared defaults ──
defaults:
  click_delay: 1.2
  ocr_confidence_threshold: 60
  max_retries: 3
  screenshot_region: null
  scroll_between_actions: false
